version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: drivermetrics_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-drivermetrics}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - drivermetrics_network

  # Node.js Backend API
  backend:
    build:
      context: ./
      dockerfile: Dockerfile.backend
    container_name: drivermetrics_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - DB_NAME=${DB_NAME:-drivermetrics}
      - NODE_ENV=production
    depends_on:
      - db
    networks:
      - drivermetrics_network

  # Streamlit Admin Dashboard
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile.dashboard
    container_name: drivermetrics_dashboard
    restart: always
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://backend:3000
    depends_on:
      - backend
    networks:
      - drivermetrics_network

volumes:
  postgres_data:

networks:
  drivermetrics_network:
    driver: bridge
